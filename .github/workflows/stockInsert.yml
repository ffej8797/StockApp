name: Stock Insert Cron

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
jobs:
  cron:
    runs-on: ubuntu-latest

    steps:
      - name: Call API
        run: |
          curl \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://stock-app-two-kappa.vercel.app/stockDataWrite